name: Auto-post new blog to LinkedIn

on:
  push:
    branches: [main]
    paths:
      - 'blogs/posts.json'
      - 'blogs/posts/**'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect newly added posts
        id: detect
        run: |
          # Compare current posts.json against previous commit
          git show HEAD~1:blogs/posts.json > /tmp/prev.json 2>/dev/null || echo '{"posts":[]}' > /tmp/prev.json
          node .github/scripts/post-to-linkedin.js detect /tmp/prev.json blogs/posts.json > /tmp/new-slugs.txt
          echo "slugs<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/new-slugs.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post to LinkedIn
        if: steps.detect.outputs.slugs != ''
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          SITE_URL:              ${{ secrets.SITE_URL }}
          NEW_SLUGS:             ${{ steps.detect.outputs.slugs }}
        run: node .github/scripts/post-to-linkedin.js post
